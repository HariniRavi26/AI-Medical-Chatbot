<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedBot — AI Medical Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f0f4f8;
  --surface:   #ffffff;
  --bot-bg:    #ffffff;
  --user-bg:   #1a56db;
  --user-text: #ffffff;
  --accent:    #1a56db;
  --accent2:   #0e3fad;
  --emergency: #dc2626;
  --success:   #16a34a;
  --text:      #111827;
  --muted:     #6b7280;
  --border:    #e5e7eb;
  --shadow:    0 2px 12px rgba(26,86,219,0.10);
  --radius:    16px;
  --font:      'DM Sans', sans-serif;
  --serif:     'DM Serif Display', serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }

.header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; gap:14px; box-shadow:0 1px 4px rgba(0,0,0,0.06); flex-shrink:0; }
.header-icon { width:42px; height:42px; background:var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.header-text h1 { font-family:var(--serif); font-size:20px; color:var(--accent); line-height:1.1; }
.header-text p  { font-size:12px; color:var(--muted); margin-top:2px; }
.header-badge { margin-left:auto; background:#dcfce7; color:#15803d; font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; }

.chat-area { flex:1; overflow-y:auto; padding:24px 16px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }

.msg-row { display:flex; align-items:flex-end; gap:8px; animation:fadeUp 0.3s ease; }
.msg-row.user { flex-direction:row-reverse; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.avatar { width:32px; height:32px; border-radius:10px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.avatar.user-av { background:#e0e7ff; font-size:14px; }

.bubble { max-width:72%; padding:12px 16px; border-radius:var(--radius); font-size:14px; line-height:1.6; box-shadow:var(--shadow); }
.bubble.bot       { background:var(--bot-bg); border-bottom-left-radius:4px; color:var(--text); }
.bubble.user      { background:var(--user-bg); color:var(--user-text); border-bottom-right-radius:4px; }
.bubble.emergency { background:#fef2f2; border-left:4px solid var(--emergency); border-bottom-left-radius:4px; }
.bubble.confirmed { background:#f0fdf4; border-left:4px solid var(--success); }
.bubble p { margin-bottom:4px; }
.bubble p:last-child { margin-bottom:0; }
.bubble strong { font-weight:600; }

.typing { display:flex; align-items:center; gap:5px; padding:14px 16px; }
.dot { width:7px; height:7px; background:var(--accent); border-radius:50%; animation:bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay:0.2s; }
.dot:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }

.chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.chip { background:#eff6ff; color:var(--accent); border:1px solid #bfdbfe; border-radius:20px; padding:6px 14px; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.18s; font-family:var(--font); }
.chip:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

.doctor-grid { display:flex; flex-direction:column; gap:12px; margin-top:10px; width:100%; }
.doc-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); transition:transform 0.18s; }
.doc-card:hover { transform:translateY(-2px); }
.doc-card-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.doc-avatar { width:48px; height:48px; border-radius:12px; background:linear-gradient(135deg,#dbeafe,#eff6ff); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.doc-info h3   { font-size:15px; font-weight:600; color:var(--text); }
.doc-info .spec{ font-size:12px; color:var(--accent); font-weight:500; margin-top:2px; }
.doc-meta { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.meta-tag { background:#f3f4f6; border-radius:8px; padding:3px 10px; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:4px; }
.meta-tag.avail { background:#dcfce7; color:#15803d; }
.meta-tag.full  { background:#fee2e2; color:#b91c1c; }
.stars { color:#f59e0b; font-size:12px; }

.date-row { display:flex; gap:6px; overflow-x:auto; padding:4px 0 8px; scrollbar-width:thin; margin-bottom:8px; }
.date-btn { flex-shrink:0; background:#f3f4f6; border:1px solid var(--border); border-radius:10px; padding:7px 12px; font-size:11px; font-family:var(--font); font-weight:500; cursor:pointer; text-align:center; transition:all 0.18s; min-width:60px; color:var(--text); }
.date-btn.selected { background:var(--accent); color:#fff; border-color:var(--accent); }
.date-btn.unavail  { opacity:0.4; cursor:not-allowed; }
.date-btn .d-day   { font-size:13px; font-weight:600; }
.date-btn .d-label { font-size:10px; color:inherit; opacity:0.8; }

.slots-label { font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; }
.slots-grid  { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.slot-btn { background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; padding:5px 12px; font-size:12px; font-family:var(--font); font-weight:500; cursor:pointer; color:var(--accent); transition:all 0.18s; }
.slot-btn:hover    { background:var(--accent); color:#fff; }
.slot-btn.selected { background:var(--accent); color:#fff; border-color:var(--accent); }
.slot-btn.booked   { background:#f3f4f6; color:#9ca3af; cursor:not-allowed; border-color:var(--border); text-decoration:line-through; }

.patient-form { display:none; flex-direction:column; gap:8px; margin-top:8px; padding-top:12px; border-top:1px solid var(--border); }
.patient-form.open { display:flex; }
.patient-form input { padding:9px 12px; border:1px solid var(--border); border-radius:10px; font-family:var(--font); font-size:13px; outline:none; transition:border-color 0.18s; width:100%; }
.patient-form input:focus { border-color:var(--accent); }
.book-btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:10px; font-family:var(--font); font-size:13px; font-weight:600; cursor:pointer; transition:background 0.18s; }
.book-btn:hover { background:var(--accent2); }
.select-slot-btn { background:#eff6ff; color:var(--accent); border:1px solid #bfdbfe; border-radius:10px; padding:8px 14px; font-size:13px; font-family:var(--font); font-weight:500; cursor:pointer; width:100%; transition:all 0.18s; }
.select-slot-btn:hover { background:var(--accent); color:#fff; }

.btype-row { display:flex; gap:8px; }
.btype-btn { flex:1; padding:7px; border-radius:8px; border:1px solid var(--border); background:#f9fafb; font-size:12px; font-family:var(--font); font-weight:500; cursor:pointer; transition:all 0.18s; color:var(--text); }
.btype-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

.input-bar { background:var(--surface); border-top:1px solid var(--border); padding:14px 16px; display:flex; gap:10px; align-items:center; flex-shrink:0; position:relative; }
.autocomplete-box { position:absolute; bottom:70px; left:16px; right:60px; background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,0.12); overflow:hidden; display:none; z-index:10; }
.ac-item { padding:10px 14px; font-size:13px; cursor:pointer; transition:background 0.15s; color:var(--text); }
.ac-item:hover { background:#eff6ff; color:var(--accent); }

#chatInput { flex:1; padding:11px 16px; border:1px solid var(--border); border-radius:24px; font-family:var(--font); font-size:14px; outline:none; transition:border-color 0.18s; background:var(--bg); }
#chatInput:focus { border-color:var(--accent); background:#fff; }
.send-btn { width:44px; height:44px; background:var(--accent); border:none; border-radius:50%; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.18s; flex-shrink:0; }
.send-btn:hover { background:var(--accent2); }
.divider { height:1px; background:var(--border); margin:8px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏥</div>
  <div class="header-text">
    <h1>MedBot</h1>
    <p>AI Medical Appointment Assistant</p>
  </div>
  <div class="header-badge">● Online</div>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="input-bar">
  <div class="autocomplete-box" id="acBox"></div>
  <input type="text" id="chatInput"
    placeholder="Describe your symptom (e.g. headache, fever, knee pain...)"
    autocomplete="off">
  <button class="send-btn" onclick="handleSend()" title="Send">&#10148;</button>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// API base URL — empty string = same origin (Flask serves both frontend & API)
// When you deploy to Render, set this to your Render URL, e.g.:
//   const API = "https://medbot-xxxx.onrender.com";
// ─────────────────────────────────────────────────────────────────────────────
const API = "";

const selectedDate  = {};
const selectedTime  = {};
const selectedBtype = {};
let gridCounter = 0;
let acTimeout = null;

// ── Boot ───────────────────────────────────────────────────────────────────────
window.onload = () => {
  botMsg(
    `👋 Hello! I'm <strong>MedBot</strong>, your AI medical appointment assistant.<br><br>Tell me your symptom and I'll find the right doctor for you.`,
    `<div class="chips">
      <div class="chip" onclick="quickSend('headache')">🤕 Headache</div>
      <div class="chip" onclick="quickSend('fever')">🌡️ Fever</div>
      <div class="chip" onclick="quickSend('knee pain')">🦵 Knee pain</div>
      <div class="chip" onclick="quickSend('anxiety')">🧠 Anxiety</div>
      <div class="chip" onclick="quickSend('eye pain')">👁️ Eye pain</div>
      <div class="chip" onclick="quickSend('chest pain')">❤️ Chest pain</div>
    </div>`
  );
};

// ── Input ─────────────────────────────────────────────────────────────────────
document.getElementById("chatInput").addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });
document.getElementById("chatInput").addEventListener("input", e => {
  clearTimeout(acTimeout);
  const q = e.target.value.trim();
  if (q.length < 2) { closeAC(); return; }
  acTimeout = setTimeout(() => fetchAC(q), 250);
});
document.addEventListener("click", e => { if (!e.target.closest(".input-bar")) closeAC(); });

async function fetchAC(q) {
  try {
    const res  = await fetch(`${API}/symptoms/search?q=${encodeURIComponent(q)}`);
    const list = await res.json();
    const box  = document.getElementById("acBox");
    if (!list.length) { box.style.display = "none"; return; }
    box.innerHTML = list.map(s => `<div class="ac-item" onclick="selectAC('${s}')">${highlight(s,q)}</div>`).join("");
    box.style.display = "block";
  } catch(e) {}
}
function highlight(text, q) { return text.replace(new RegExp(`(${q})`, "gi"), "<strong>$1</strong>"); }
function closeAC() { document.getElementById("acBox").style.display = "none"; }
function selectAC(val) { document.getElementById("chatInput").value = val; closeAC(); }
function quickSend(text) { document.getElementById("chatInput").value = text; handleSend(); }

function handleSend() {
  const input = document.getElementById("chatInput");
  const text  = input.value.trim();
  if (!text) return;
  userMsg(text);
  input.value = "";
  closeAC();
  showTyping().then(() => findDoctor(text));
}

// ── Find Doctor ────────────────────────────────────────────────────────────────
async function findDoctor(symptom) {
  try {
    const res  = await fetch(`${API}/get_doctor`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ symptom, date: todayStr() })
    });
    const data = await res.json();

    if (data.emergency) {
      botBubble("emergency", `
        <strong>🚨 EMERGENCY DETECTED</strong><br><br>
        ${data.message}<br><br>
        <p><strong>Nearest Doctor:</strong> ${data.doctor_name}</p>
        <p><strong>Hospital:</strong> ${data.hospital_name}</p>
        <p><strong>Hospital Phone:</strong> ${data.hospital_phone}</p>
        <p style="margin-top:10px;font-size:18px;font-weight:700;color:#dc2626;">
          🚑 Call Ambulance: <a href="tel:108" style="color:#dc2626;">108</a>
        </p>`);
      return;
    }

    if (data.message) {
      botMsg(data.message, `<div class="chips">
        <div class="chip" onclick="quickSend('fever')">Try: Fever</div>
        <div class="chip" onclick="quickSend('headache')">Try: Headache</div>
        <div class="chip" onclick="quickSend('back pain')">Try: Back pain</div>
      </div>`);
      return;
    }

    const spec = data[0]?.specialization || "specialist";
    botMsg(`I found <strong>${data.length} ${spec}</strong> doctor(s) for you. Pick a date and time slot to book:`);
    appendDoctorCards(data);

  } catch(err) {
    botMsg("⚠️ Cannot reach the server. Are you opening this page through Flask? Go to <strong>http://127.0.0.1:5000</strong> in your browser — do not open the HTML file directly.");
  }
}

// ── Doctor Cards ───────────────────────────────────────────────────────────────
function appendDoctorCards(doctors) {
  gridCounter++;
  const gridId = `docGrid-${gridCounter}`;
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `<div class="avatar">🏥</div><div class="doctor-grid" id="${gridId}"></div>`;
  document.getElementById("chatArea").appendChild(row);
  const grid = document.getElementById(gridId);

  doctors.forEach(doc => {
    selectedDate[doc.doctor_id]  = todayStr();
    selectedTime[doc.doctor_id]  = null;
    selectedBtype[doc.doctor_id] = "General";

    const card   = document.createElement("div");
    card.className = "doc-card";
    card.id = `card-${doc.doctor_id}-${gridCounter}`;

    const stars       = "★".repeat(Math.round(doc.rating)) + "☆".repeat(5 - Math.round(doc.rating));
    const statusClass = doc.booked >= doc.max_patients ? "full"  : "avail";
    const statusText  = doc.booked >= doc.max_patients ? "Fully Booked Today" : "Available";
    const uid = `${doc.doctor_id}-${gridCounter}`;

    card.innerHTML = `
      <div class="doc-card-top">
        <div class="doc-avatar">👨‍⚕️</div>
        <div class="doc-info">
          <h3>${doc.doctor_name}</h3>
          <div class="spec">${doc.specialization}</div>
        </div>
      </div>
      <div class="doc-meta">
        <span class="meta-tag">🏥 ${doc.hospital_name}</span>
        <span class="meta-tag">⏱ ${doc.experience} yrs exp</span>
        <span class="meta-tag"><span class="stars">${stars}</span> ${doc.rating}</span>
        <span class="meta-tag ${statusClass}">${statusText}</span>
      </div>
      <div class="date-row" id="dates-${uid}">
        <div style="font-size:12px;color:var(--muted);align-self:center;">Loading dates...</div>
      </div>
      <div class="slots-label">Choose a time slot</div>
      <div class="slots-grid" id="slots-${uid}">
        <div style="font-size:12px;color:var(--muted)">Select a date first</div>
      </div>
      <div class="btype-row" style="margin-bottom:10px;">
        <button class="btype-btn active" id="gen-${uid}" onclick="setBtype('${uid}',${doc.doctor_id},'General',this)">General Checkup</button>
        <button class="btype-btn"        id="fup-${uid}" onclick="setBtype('${uid}',${doc.doctor_id},'Follow-up',this)">Follow-up</button>
        <button class="btype-btn"        id="urg-${uid}" onclick="setBtype('${uid}',${doc.doctor_id},'Urgent',this)">Urgent</button>
      </div>
      <button class="select-slot-btn" onclick="openForm('${uid}',${doc.doctor_id})">📋 Enter Patient Details</button>
      <div class="patient-form" id="form-${uid}">
        <input type="text"   id="name-${uid}"  placeholder="Patient full name *" required>
        <input type="number" id="age-${uid}"   placeholder="Age" min="1" max="120">
        <input type="tel"    id="phone-${uid}" placeholder="Phone number">
        <button class="book-btn" onclick="bookAppointment('${uid}',${doc.doctor_id})">✅ Confirm Appointment</button>
      </div>`;

    grid.appendChild(card);
    loadDates(uid, doc.doctor_id, doc.slots);
  });
  scrollToBottom();
}

// ── Dates & Slots ──────────────────────────────────────────────────────────────
async function loadDates(uid, doctorId, todaySlots) {
  try {
    const res   = await fetch(`${API}/available_dates/${doctorId}`);
    const dates = await res.json();
    const cont  = document.getElementById(`dates-${uid}`);
    if (!cont) return;
    cont.innerHTML = "";
    const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    dates.forEach((d, i) => {
      const dt  = new Date(d.date + "T00:00:00");
      const btn = document.createElement("button");
      btn.className = "date-btn" + (i === 0 ? " selected" : "") + (!d.available ? " unavail" : "");
      btn.innerHTML = `<div class="d-day">${dt.getDate()}</div><div class="d-label">${days[dt.getDay()]}</div>`;
      if (d.available) btn.onclick = () => selectDate(uid, doctorId, d.date, btn, cont);
      cont.appendChild(btn);
    });
    renderSlots(uid, doctorId, todaySlots);
  } catch(e) {
    const cont = document.getElementById(`dates-${uid}`);
    if (cont) cont.innerHTML = `<span style="font-size:12px;color:var(--muted)">Could not load dates</span>`;
  }
}

function selectDate(uid, doctorId, date, btn, cont) {
  cont.querySelectorAll(".date-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedDate[doctorId] = date;
  selectedTime[doctorId] = null;
  fetchSlotsForDate(uid, doctorId, date);
}

async function fetchSlotsForDate(uid, doctorId, date) {
  try {
    const res   = await fetch(`${API}/slots/${doctorId}?date=${date}`);
    const slots = await res.json();
    if (Array.isArray(slots)) renderSlots(uid, doctorId, slots);
  } catch(e) {}
}

function renderSlots(uid, doctorId, slots) {
  const cont = document.getElementById(`slots-${uid}`);
  if (!cont) return;
  cont.innerHTML = "";
  if (!slots || !slots.length) {
    cont.innerHTML = `<span style="font-size:12px;color:var(--muted)">No slots available</span>`;
    return;
  }
  slots.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "slot-btn" + (s.booked ? " booked" : "");
    btn.textContent = s.time;
    if (!s.booked) {
      btn.onclick = () => {
        cont.querySelectorAll(".slot-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedTime[doctorId] = s.time;
      };
    }
    cont.appendChild(btn);
  });
}

function setBtype(uid, doctorId, type, btn) {
  selectedBtype[doctorId] = type;
  ["gen","fup","urg"].forEach(p => {
    const b = document.getElementById(`${p}-${uid}`);
    if (b) b.classList.remove("active");
  });
  btn.classList.add("active");
}

function openForm(uid, doctorId) {
  if (!selectedTime[doctorId]) { alert("Please select a time slot first."); return; }
  const form = document.getElementById(`form-${uid}`);
  if (form) form.classList.toggle("open");
}

// ── Book Appointment ───────────────────────────────────────────────────────────
async function bookAppointment(uid, doctorId) {
  const name  = document.getElementById(`name-${uid}`)?.value.trim();
  const age   = document.getElementById(`age-${uid}`)?.value.trim();
  const phone = document.getElementById(`phone-${uid}`)?.value.trim();
  const date  = selectedDate[doctorId];
  const time  = selectedTime[doctorId];
  const btype = selectedBtype[doctorId] || "General";

  if (!name) { alert("Please enter the patient's name."); return; }
  if (!time) { alert("Please select a time slot."); return; }

  showTyping().then(async () => {
    try {
      const res  = await fetch(`${API}/book_appointment`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ patient_name:name, patient_age:age||null, patient_phone:phone, doctor_id:doctorId, date, time, booking_type:btype })
      });
      const data = await res.json();

      if (data.message) { botMsg(`⚠️ ${data.message}`); return; }

      botBubble("confirmed", `
        <strong>✅ Appointment Confirmed!</strong>
        <div class="divider"></div>
        <p>👤 <strong>Patient:</strong> ${data.patient_name}${age ? ", Age " + age : ""}</p>
        <p>👨‍⚕️ <strong>Doctor:</strong> ${data.doctor_name}</p>
        <p>🏥 <strong>Hospital:</strong> ${data.hospital_name}</p>
        <p>📅 <strong>Date:</strong> ${formatDate(data.date)}</p>
        <p>🕐 <strong>Time:</strong> ${data.time}</p>
        <p>📋 <strong>Type:</strong> ${data.booking_type}</p>
        <p style="margin-top:8px;font-size:12px;color:var(--muted)">Booking ID: #APT-${data.appointment_id || "---"}</p>`);

      const card = document.getElementById(`card-${uid}`);
      if (card) { card.style.opacity = "0.5"; card.style.pointerEvents = "none"; }

      botMsg("Is there anything else I can help you with? 😊", `<div class="chips">
        <div class="chip" onclick="quickSend('fever')">Search new symptom</div>
        <div class="chip" onclick="location.reload()">Start over</div>
      </div>`);
    } catch(e) {
      botMsg("⚠️ Booking failed. Please check your connection and try again.");
    }
  });
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().split("T")[0]; }
function formatDate(str) {
  const d = new Date(str + "T00:00:00");
  return d.toLocaleDateString("en-IN", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
}
function userMsg(text) {
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = `<div class="bubble user">${text}</div><div class="avatar user-av">👤</div>`;
  document.getElementById("chatArea").appendChild(row);
  scrollToBottom();
}
function botMsg(html, extra = "") {
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `<div class="avatar">🤖</div><div class="bubble bot">${html}${extra}</div>`;
  document.getElementById("chatArea").appendChild(row);
  scrollToBottom();
}
function botBubble(cls, html) {
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `<div class="avatar">🤖</div><div class="bubble ${cls}">${html}</div>`;
  document.getElementById("chatArea").appendChild(row);
  scrollToBottom();
}
function showTyping() {
  return new Promise(resolve => {
    const row = document.createElement("div");
    row.className = "msg-row";
    row.id = "typingRow";
    row.innerHTML = `<div class="avatar">🤖</div><div class="bubble bot typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    document.getElementById("chatArea").appendChild(row);
    scrollToBottom();
    setTimeout(() => { const t = document.getElementById("typingRow"); if (t) t.remove(); resolve(); }, 900);
  });
}
function scrollToBottom() { const a = document.getElementById("chatArea"); a.scrollTop = a.scrollHeight; }
</script>
